{% extends 'base.html' %}

{% block content %}
<div class="row">
    <!-- Center Column: Create Announcement Form -->
    <div class="col-lg-8 mx-auto mb-4">
        <div class="card shadow-sm border-0 h-100">
            <div class="card-header border-bottom-0 py-3">
                <h4 class="mb-0 fw-semibold text-dsvv-blue"><i class="bi bi-megaphone-fill me-2"></i>Create Announcement
                </h4>
            </div>
            <div class="card-body p-4">
                <form action="/preview" method="POST">

                    <div class="row g-3">
                        <!-- Title -->
                        <div class="col-md-8">
                            <label for="title" class="form-label fw-semibold">Announcement Title <span
                                    class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="title" name="title" required
                                placeholder="Enter a descriptive title" value="{{ data.title | default('') }}">
                        </div>

                        <!-- Priority -->
                        <div class="col-md-4">
                            <label for="priority" class="form-label fw-semibold">Priority</label>
                            <select class="form-select" id="priority" name="priority">
                                <option value="normal" {% if data.priority == 'normal' or not data.priority %}selected{% endif %}>Normal</option>
                                <option value="important" {% if data.priority == 'important' %}selected{% endif %}>Important</option>
                                <option value="urgent" class="fw-bold text-warning" {% if data.priority == 'urgent' %}selected{% endif %}>Urgent</option>
                                <option value="emergency" class="fw-bold text-danger" {% if data.priority == 'emergency' %}selected{% endif %}>Emergency</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-4 mt-3">
                        <label for="schedule_time" class="form-label fw-semibold">Schedule Time <span
                                class="text-muted fw-normal">(optional)</span></label>
                        <input type="datetime-local" class="form-control" id="schedule_time" name="schedule_time" value="{{ data.local_schedule_time_str | default('') }}">
                        <div class="form-text text-muted"><i class="bi bi-clock me-1"></i>If left blank, the
                            announcement will be sent immediately.</div>
                    </div>

                    <div class="row g-3 mt-2">
                        <!-- Department SMTP Dropdown -->
                        <div class="col-md-6 mb-4">
                            <label for="smtp_config_id" class="form-label fw-semibold">Sending Department Email <span
                                    class="text-danger">*</span></label>
                            <select class="form-select" id="smtp_config_id" name="smtp_config_id" required>
                                <option value="" disabled selected>Select an email account...</option>
                                {% for config in smtp_configs %}
                                <option value="{{ config._id }}" {% if data.smtp_config_id == config._id|string %}selected{% endif %}>{{ config.department | dept_display }} ({{ config.email
                                    }})</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-4 mt-1">
                        <label for="content" class="form-label fw-semibold">Content <span
                                class="text-danger">*</span></label>
                        <textarea class="form-control" id="content" name="content">{{ data.content | default('') }}</textarea>
                    </div>

                    <!-- Target Audience Section -->
                    <div class="target-group bg-light border rounded p-3 mb-4">
                        <h6 class="fw-semibold text-secondary mb-3"><i class="bi bi-bullseye me-2"></i>Target Audience
                        </h6>

                        <div class="row g-3">
                            <!-- Main Target Type -->
                            <div class="col-md-4">
                                <label class="form-label small fw-semibold">Send To <span
                                        class="text-danger">*</span></label>
                                <select class="form-select" id="target_type" name="target_type" required
                                    onchange="toggleFields()">
                                    {% set t_type = data.target_dict.target_type if data.target_dict else 'all' %}
                                    <option value="all" {% if t_type == 'all' %}selected{% endif %}>All Users</option>
                                    <option value="student" {% if t_type == 'student' %}selected{% endif %}>Students</option>
                                    <option value="faculty" {% if t_type == 'faculty' %}selected{% endif %}>Faculty</option>
                                    <option value="alumni" {% if t_type == 'alumni' %}selected{% endif %}>Alumni</option>
                                    <option value="department" {% if t_type == 'department' %}selected{% endif %}>Specific Department</option>
                                    <option value="course" {% if t_type == 'course' %}selected{% endif %}>Specific Course</option>
                                    <option value="year" {% if t_type == 'year' %}selected{% endif %}>Specific Year</option>
                                    <option value="test" {% if t_type == 'test' %}selected{% endif %}>Test</option>
                                </select>
                            </div>

                            <!-- Conditional: Department -->
                            <div class="col-md-4 conditional-field" id="wrap_department" style="display:none;">
                                <label class="form-label small fw-semibold">Department <span
                                        class="text-muted fw-normal">(optional)</span></label>
                                <input type="text" class="form-control" name="department"
                                    placeholder="e.g. Computer Science" value="{{ data.target_dict.department if data.target_dict else '' }}">
                            </div>

                            <!-- Conditional: Course -->
                            <div class="col-md-4 conditional-field" id="wrap_course" style="display:none;">
                                <label class="form-label small fw-semibold">Course <span
                                        class="text-muted fw-normal">(optional)</span></label>
                                <input type="text" class="form-control" name="course" placeholder="e.g. BCA" value="{{ data.target_dict.course if data.target_dict else '' }}">
                            </div>

                            <!-- Conditional: Year -->
                            <div class="col-md-4 conditional-field" id="wrap_year" style="display:none;">
                                <label class="form-label small fw-semibold">Year <span
                                        class="text-muted fw-normal">(optional)</span></label>
                                <select class="form-select" name="year">
                                    {% set t_year = data.target_dict.year if data.target_dict else '' %}
                                    <option value="" {% if not t_year %}selected{% endif %}>Any Year</option>
                                    <option value="1" {% if t_year == '1' %}selected{% endif %}>1st Year</option>
                                    <option value="2" {% if t_year == '2' %}selected{% endif %}>2nd Year</option>
                                    <option value="3" {% if t_year == '3' %}selected{% endif %}>3rd Year</option>
                                    <option value="4" {% if t_year == '4' %}selected{% endif %}>4th Year</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-text mt-3 text-muted">
                            <i class="bi bi-info-circle me-1"></i> Sub-filters (like Department or Course) act as an AND
                            condition if filled.
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <button type="submit" class="btn btn-primary px-4 fw-semibold">
                            <i class="bi bi-eye-fill me-1"></i> Preview Announcement
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    ClassicEditor
        .create(document.querySelector('#content'))
        .catch(error => {
            console.error(error);
        });

    function toggleFields() {
        const tType = document.getElementById('target_type').value;
        const wDept = document.getElementById('wrap_department');
        const wCourse = document.getElementById('wrap_course');
        const wYear = document.getElementById('wrap_year');

        // Hide all first
        wDept.style.display = 'none';
        wCourse.style.display = 'none';
        wYear.style.display = 'none';

        // Show based on selection
        if (tType === 'student') {
            wDept.style.display = 'block';
            wCourse.style.display = 'block';
            wYear.style.display = 'block';
        } else if (tType === 'faculty' || tType === 'alumni') {
            wDept.style.display = 'block';
            wCourse.style.display = 'block';
        } else if (tType === 'department') {
            wDept.style.display = 'block';
        } else if (tType === 'course') {
            wDept.style.display = 'block';
            wCourse.style.display = 'block';
        } else if (tType === 'year') {
            wCourse.style.display = 'block';
            wYear.style.display = 'block';
        }
    }

    // run on mount
    toggleFields();
</script>
{% endblock %}
